# PT-CI — Desktop DMG build pipeline for CedarGuard.
#
# Two trigger modes:
#   1. push to main → lint + build gate ONLY (cheap, runs on every push).
#   2. tag v*       → full DMG build, sign (if Apple secrets present),
#                     notarise, upload artifact to the run (no auto-publish
#                     until M-UpdateRelease wires the static feed).
#
# Why no off-the-shelf "Electron action": `samuelmeuli/action-electron-builder`
# is unmaintained per research. We call electron-builder directly, which is
# what most active production Electron projects do (Insomnia, GitHub Desktop).
#
# Without Apple secrets: produces an unsigned DMG (current local-build behaviour).
# With secrets: produces a signed + notarised DMG that opens cleanly on any Mac.

name: Build desktop

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  # ─── Lint + build gate on every push to main ─────────────────────────
  gate:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest  # gates don't need macOS
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'  # gates don't need the Electron binary
      - name: TypeScript gate
        run: npx tsc --noEmit
      - name: Web build gate
        run: npm run build

  # ─── Full DMG build on tag push ──────────────────────────────────────
  dmg:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest  # GitHub's macos-latest is arm64 (macos-14+)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install
        run: npm ci

      # ─── Apple cert import into a temporary keychain ───────────────────
      # Critical: import into a per-run keychain, NOT the default keychain.
      # apple-actions/import-codesign-certs handles temp-keychain lifecycle.
      # Step is conditional: if CSC_LINK is not configured (i.e. cert not
      # yet procured), skip and produce an unsigned DMG.
      - name: Import Apple signing certificate
        if: env.CSC_LINK != ''
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}

      - name: Build + sign + notarise DMG
        run: npm run dist:mac
        env:
          # All optional — when unset, electron-builder produces unsigned DMG.
          # When set, builder 24+ handles notarytool natively (no afterSign hook).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Vite/desktop env baked into the binary (public-by-design).
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GOOGLE_DESKTOP_CLIENT_ID: ${{ secrets.VITE_GOOGLE_DESKTOP_CLIENT_ID }}
          VITE_GOOGLE_DESKTOP_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_DESKTOP_CLIENT_SECRET }}
          VITE_DESKTOP_API_URL: ${{ secrets.VITE_DESKTOP_API_URL }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CedarGuard-${{ github.ref_name }}-arm64.dmg
          path: dist-electron/*.dmg
          retention-days: 90
